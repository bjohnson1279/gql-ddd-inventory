name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: inventory_user
          POSTGRES_PASSWORD: inventory_password
          POSTGRES_DB: inventory_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://inventory_user:inventory_password@127.0.0.1:5433/inventory_db?schema=public"
      JWT_SECRET: "ci-secret-token-key-999"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Root Dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Push Prisma DB Schema
        run: pnpm exec prisma db push --accept-data-loss

      - name: Run Backend Jest Tests
        run: pnpm test

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: pnpm install

      - name: Build Frontend Assets
        working-directory: ./web
        run: pnpm run build

      - name: Install Playwright Browsers
        working-directory: ./web
        run: pnpm exec playwright install chromium

      - name: Run Playwright E2E Tests
        working-directory: ./web
        run: pnpm run test:e2e
